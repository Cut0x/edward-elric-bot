# Nginx example for Edward Elric Bot served like:
# http://localhost/edward-elric-bot/public/users
# Adjust paths and PHP socket/upstream for your server.

server {
    listen 80;
    server_name localhost;

    root /var/www;
    index index.php;

    charset utf-8;
    client_max_body_size 8m;

    location /edward-elric-bot/public/ {
        try_files $uri $uri/ @pretty;
    }

    location @pretty {
        rewrite ^/edward-elric-bot/public/user/([0-9]+)$ /edward-elric-bot/public/user.php?id=$1 last;
        rewrite ^/edward-elric-bot/public/card/([0-9]+)$ /edward-elric-bot/public/card.php?id=$1 last;
        rewrite ^/edward-elric-bot/public/proposal/([0-9]+)$ /edward-elric-bot/public/proposal.php?id=$1 last;
        rewrite ^/edward-elric-bot/public/index$ /edward-elric-bot/public/ permanent;
        rewrite ^/edward-elric-bot/public/admin/([A-Za-z0-9_-]+)$ /edward-elric-bot/public/admin/$1.php last;
        rewrite ^/edward-elric-bot/public/([A-Za-z0-9_-]+)$ /edward-elric-bot/public/$1.php last;
        return 404;
    }

    location ~ \.php$ {
        if ($request_uri ~ ^/edward-elric-bot/public/(user|card|proposal)\.php\?id=([0-9]+)$) {
            return 301 /edward-elric-bot/public/$1/$2;
        }
        if ($request_uri ~ ^/edward-elric-bot/public/index\.php(?:\?.*)?$) {
            return 301 /edward-elric-bot/public/$is_args$args;
        }
        if ($request_uri ~ ^/edward-elric-bot/public/(.+)\.php(?:\?.*)?$) {
            return 301 /edward-elric-bot/public/$1$is_args$args;
        }
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
    }

    location ~ /\.(?!well-known) {
        deny all;
    }
}
